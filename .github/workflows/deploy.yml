name: 🚀 WellGuard AI — Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  test:
    name: 🧪 Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    name: 🌐 Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: test          # Only deploy if tests pass
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/unity_root
          chmod 600 ~/.ssh/unity_root
          ssh-keyscan -H 46.202.130.253 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/unity_root -o StrictHostKeyChecking=no root@46.202.130.253 << 'EOF'
            set -e
            echo "==> Pulling latest code..."
            cd /opt/wellguard
            git fetch origin main
            git reset --hard origin/main

            echo "==> Installing/updating Python packages..."
            source venv/bin/activate
            pip install --quiet -r requirements.txt

            echo "==> Restarting Streamlit via Supervisor..."
            supervisorctl restart wellguard

            echo "==> Health check..."
            sleep 3
            curl -sf http://localhost:8501/_stcore/health && echo "App is healthy!" || echo "Warning: Health check failed"
          EOF

      - name: Notify success
        if: success()
        run: echo "✅ WellGuard AI deployed successfully to http://46.202.130.253"
